# This is a Databricks asset bundle definition for pediatric-adr-events.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.
bundle:
  name: pediatric-adr-events
  uuid: f2e8030b-b1cc-4c47-b188-fd920a76dd11

sync:
  include:
    - resources/*.yml
    - resources/*/*.yml
  exclude:
    - resources/adr_job.jobs.yml

artifacts:
  ingestion_modules:
    type: whl 
    path: ./ingestion_modules
    build: uv build --wheel
  rxnorm_modules:
    type: whl 
    path: ./rxnorm_modules
    build: uv build --wheel

# Variable declarations. These variables are assigned in the dev/prod targets below.
variables:
  catalog:
    description: The catalog to use
  schema:
    description: The schema to use

targets:
  dev:
    # The default target uses 'mode: development' to create a development copy.
    # - Deployed resources get prefixed with '[dev my_user_name]'
    # - Any job schedules and triggers are paused by default.
    # See also https://docs.databricks.com/dev-tools/bundles/deployment-modes.html.
    mode: development
    default: true
    workspace:
      host: https://dbc-3d0644b9-6ccc.cloud.databricks.com
    variables:
      catalog: pediatric_adr_events
      schema: ${workspace.current_user.short_name}
  prod:
    mode: production
    workspace:
      host: https://dbc-3d0644b9-6ccc.cloud.databricks.com
      # We explicitly deploy to /Workspace/Users/kisarawenu@gmail.com to make sure we only have a single copy.
      root_path: /Workspace/Users/kisarawenu@gmail.com/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: pediatric_adr_events
      schema: prod
    permissions:
      - user_name: kisarawenu@gmail.com
        level: CAN_MANAGE
